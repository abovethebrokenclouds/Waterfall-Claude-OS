# Auto-Shorts — Render Blueprint (one managed deploy of backend + worker + data).
#
# This lives at the repository root so Render's "New > Blueprint" (and the
# Deploy-to-Render button in auto-shorts/infra/DEPLOY.md) work one-click. It
# deploys ONLY the auto-shorts app under auto-shorts/. Paths are repo-root
# relative. Secrets (sync: false) are entered in the Render dashboard.
services:
  - type: web
    name: auto-shorts-backend
    runtime: docker
    dockerfilePath: auto-shorts/infra/docker/backend.Dockerfile
    dockerContext: auto-shorts
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS          # set to your Lovable app origin(s)
        sync: false
      - key: WORKER_URL
        value: http://auto-shorts-worker:5001
      - key: DATABASE_URL
        fromDatabase:
          name: auto-shorts-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: auto-shorts-redis
          property: connectionString

  - type: pserv                    # private service: only the backend reaches it
    name: auto-shorts-worker
    runtime: docker
    dockerfilePath: auto-shorts/infra/docker/worker.Dockerfile
    dockerContext: auto-shorts
    plan: standard                 # Whisper + ffmpeg want more memory
    envVars:
      - key: RENDER_DRY_RUN
        value: "0"
      - key: PORT
        value: "5001"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: auto-shorts-redis
          property: connectionString
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false

  - type: keyvalue
    name: auto-shorts-redis
    plan: starter
    ipAllowList: []                # internal only

databases:
  - name: auto-shorts-db
    plan: basic-256mb
