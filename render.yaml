# Auto-Shorts — easy one-service backend deploy (Render Blueprint, repo root).
#
# Deploys ONE small Node service with ZERO secrets required. It runs in
# "standalone" mode (built-in sample transcript + in-memory storage), so it needs
# no worker, Postgres, or Redis — /health and the frontend's "Test connection"
# work immediately.
#
# After it's up, add these in the Render dashboard (backend → Environment):
#   ANTHROPIC_API_KEY  -> generate real AI shorts (without it, generation is disabled)
#   CORS_ORIGINS       -> lock the API to your app origin (defaults to any origin)
#
# Want real transcription + rendering (Whisper/FFmpeg, Postgres, Redis, S3)?
# Use the full blueprint: auto-shorts/infra/render.full.yaml
services:
  - type: web
    name: auto-shorts-backend
    runtime: docker
    dockerfilePath: auto-shorts/infra/docker/backend.Dockerfile
    dockerContext: auto-shorts
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
