# Auto-Shorts — full production stack on a single Docker host (VPS, etc.).
# From the auto-shorts/ directory:
#   cp .env.example .env   # fill ANTHROPIC_API_KEY, set CORS_ORIGINS, etc.
#   docker compose -f infra/docker-compose.prod.yml --env-file .env up -d --build
#
# Expose the `backend` port (4000) publicly (behind a reverse proxy / TLS) and
# point the Lovable app's VITE_API_BASE_URL at it.
services:
  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      WORKER_URL: http://worker:5001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auto_shorts
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      worker: { condition: service_started }

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      RENDER_DRY_RUN: "0"
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
    depends_on:
      redis: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auto_shorts
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
